
<ion-app *ngIf="lyric">
    <ion-toolbar>
        <ion-buttons slot="secondary">
          <ion-button (click)="goBack()"><ion-icon slot="icon-only" name="arrow-back"></ion-icon></ion-button>
        </ion-buttons>
        <ion-title>{{lyric.title}}</ion-title>
    </ion-toolbar>
  <ion-content fullscreen>
      <div [innerHTML]="lyric.lyric">
      </div>
  </ion-content>
</ion-app>
