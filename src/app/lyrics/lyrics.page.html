
<ion-app *ngIf="lyric">
  <ion-toolbar>
      <ion-buttons slot="secondary">
        <ion-button (click)="goBack()"><ion-icon slot="icon-only" name="arrow-back"></ion-icon></ion-button>
      </ion-buttons>
      <ion-title>{{lyric.title}}</ion-title>
  </ion-toolbar>
  <ion-content fullscreen>
    <ion-grid>
      <ion-row>
        <ion-col>
          <div class="div-lyric" [innerHTML]="lyric.lyric">
          </div>
          </ion-col>
      </ion-row>
      <ion-row>
        <ion-col>
          <div class="div-lyric">
            <h4>Namorona: {{lyric.author}} </h4>
            <h4>Clé: {{lyric.keySong}}</h4>
          </div>
        </ion-col>
      </ion-row>
    </ion-grid>
  </ion-content>
</ion-app>
